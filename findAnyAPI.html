<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindAny API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="findAnyAPI.css">
    
</head>
<body>
    <div>
    <nav class="bg-danger p-2 text-end">
        <a href="index.html">
        <button class="btn bg-dark text-white">SignUp</button>
        </a>
    </nav>
    <div class="container my-5 py-5 bg-dark text-white">
        
        <h1>FindAny API Search Engine</h1>
        
        <div class="browser-window">
            <div class="browser-header bg-teritory">
                <div class="dot"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="browser-toolbar">
                <div class="input-group">
                    <input id="userInput" type="text" class="form-control" placeholder="Search here...">
                    <button id="askGemini" class="btn btn-info">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        class="bi bi-search" viewBox="0 0 16 16">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg>
                    </button>
                </div>
            </div>

            <div id="result">
                
            </div>

        </div>
        
    </div>
    <footer class="bg-dark py-3 text-center">
    <a href="thankYou.html">
        <button class="btn bg-body-tertiary text-dark text-center hover-zoom">Close</button>
        </a>
        </footer>
    </div>
    <script src="findAnyAPI.js"></script>
</body>
</html>
